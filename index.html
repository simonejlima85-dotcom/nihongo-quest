<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simone no Nihongo Quest • Dark</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
  body { background: #0f0f13; min-height: 100vh; color: #e2e8f0; }
  .sakura { position: fixed; top: -20px; animation: fall linear infinite; pointer-events: none; z-index: 9999; opacity: 0.6; }
  @keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
  .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .streak-fire { animation: flame 1.2s ease-in-out infinite alternate; }
  @keyframes flame {
    from { transform: scale(1); filter: brightness(1); }
    to { transform: scale(1.15); filter: brightness(1.3); }
  }
  .card-flip { perspective: 1000px; }
  .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    position: absolute; width: 100%; height: 100%;
  }
  .card-back { transform: rotateY(180deg); }
  .tab-active { background: linear-gradient(135deg, #ec4899, #a855f7); color: white; }
</style>
</head>
<body class="bg-[#0f0f13] text-slate-200">

<div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
  <div class="text-6xl mb-4">🌸</div>
  <h1 class="text-3xl font-bold bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent mb-2">Simone no Nihongo Quest</h1>
  <p class="text-slate-400 mb-4">Versão Dark restaurada!</p>
  <p class="text-sm text-slate-500 max-w-xs mb-6">Estou enviando o arquivo completo agora. Aguarde 1 minuto e atualize a página.</p>
  <button onclick="location.reload()" class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-6 py-3 rounded-full font-semibold">
    Atualizar página
  </button>
</div>

</body>
</html>
